spring.application.name=minimarket

# Configuracion de H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

server.port=8081

# Configuracion de JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Logs de depuración
logging.level.org.springframework.security=DEBUG
logging.level.com.minimarket=DEBUG


jwt.secret=${JWT_SECRET:MiClaveSecretaParaMiniMarketPlus2026Segura}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.issuer=${JWT_ISSUER:minimarket-plus}